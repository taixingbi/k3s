# Embedding gateway — dev (namespace ai-dev, NodePort 30181).
# Routes POST /v1/embeddings to vLLM embedding backends on each GPU node (:8001).
# Image / source: https://github.com/taixingbi/layer-gateway-embed-v1
# Configure backends with EMBED_BACKENDS (see docs/deploy-gateway-embedding.md).
#
# Optional: sudo k3s ctr images pull docker.io/taixingbi/layer-gateway-embed-v1:latest

apiVersion: v1
kind: Namespace
metadata:
  name: ai-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer-gateway-embedding
  namespace: ai-dev
  labels:
    app: layer-gateway-embedding
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: layer-gateway-embedding
  template:
    metadata:
      labels:
        app: layer-gateway-embedding
        environment: dev
    spec:
      automountServiceAccountToken: false
      containers:
        - name: gateway
          image: docker.io/taixingbi/layer-gateway-embed-v1:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 30181
          env:
            - name: GATEWAY_HOST
              value: "0.0.0.0"
            - name: GATEWAY_PORT
              value: "30181"
            # name=url,name=url — same LAN layout as docker-compose in upstream repo
            - name: EMBED_BACKENDS
              value: "embed-node-1=http://192.168.86.173:8001,embed-node-2=http://192.168.86.176:8001"
            - name: TIMEOUT_CONNECT_MS
              value: "1000"
            - name: TIMEOUT_READ_MS
              value: "15000"
            - name: RETRY_MAX_ATTEMPTS
              value: "2"
            - name: ADMISSION_MAX_CONCURRENT
              value: "100"
            - name: ADMISSION_WAIT_TIMEOUT_MS
              value: "500"
            - name: CB_FAILURE_THRESHOLD
              value: "5"
            - name: CB_RESET_TIMEOUT_SEC
              value: "30"
            - name: ROUTING_INFLIGHT_WEIGHT
              value: "20.0"
            - name: ROUTING_LATENCY_WEIGHT
              value: "0.5"
            - name: ROUTING_ERROR_WEIGHT
              value: "100.0"
            - name: ROUTING_EXPLORATION_RATE
              value: "0.15"
            - name: ROUTING_MAX_IDLE_MS
              value: "500"
            - name: LOG_LEVEL
              value: INFO
            - name: LOG_JSON
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: layer-gateway-embedding
  namespace: ai-dev
  labels:
    app: layer-gateway-embedding
    environment: dev
spec:
  type: NodePort
  selector:
    app: layer-gateway-embedding
  ports:
    - name: http
      port: 30181
      targetPort: http
      nodePort: 30181
