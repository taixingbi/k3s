apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-conf
  namespace: ai
data:
  default.conf: |
    upstream inference_backend {
      server inference-qwen25-7b-1.ai.svc.cluster.local:8000;
      server inference-qwen25-7b-2.ai.svc.cluster.local:8000;
    }

    server {
      listen 8080;
      client_max_body_size 64m;

      location / {
        proxy_pass http://inference_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      nodeSelector:
        kubernetes.io/hostname: server-node-1
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: nginx-conf
          configMap:
            name: gateway-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ai
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30090