# Example only: copy to prometheus-grafana-cloud-secret.local.yaml (gitignored),
# replace api-key with a Grafana Cloud token that has metrics:write, then:
#   sudo k3s kubectl apply -f prometheus-grafana-cloud-secret.local.yaml
#   sudo k3s kubectl rollout restart deployment/prometheus -n monitoring
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-grafana-cloud-remote-write
  namespace: monitoring
type: Opaque
stringData:
  api-key: "glc_REPLACE_ME"
