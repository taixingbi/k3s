# Grafana Alloy (DaemonSet): tail pod logs on each node via Kubernetes API, enrich labels,
# parse CRI + JSON, optional structured metadata for LogQL, forward to Grafana Cloud Loki (loki.write).
# No in-cluster Loki — use Grafana Cloud → Explore + imported Loki dashboard.
#
# Prerequisites: Grafana Cloud stack with Loki; create an access policy token with **logs:write**.
# In Grafana Cloud: Your stack → **Loki** → **Details** for the push URL and **User** (numeric id).
# After apply, replace the Secret placeholder (same pattern as `prometheus-grafana.yaml`).
# Liveness uses `/-/ready`, not `/-/healthy`: when Loki credentials/URL are wrong, `loki.write`
# is unhealthy but restarting the pod does not help (see Alloy HTTP docs).
#
# Alloy docs: https://grafana.com/docs/alloy/latest/collect/logs-in-kubernetes/

apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy-logs
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-logs
rules:
  - apiGroups: [""]
    resources: [namespaces, pods, pods/log, pods/status]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-logs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-logs
subjects:
  - kind: ServiceAccount
    name: alloy-logs
    namespace: monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: alloy-grafana-cloud-loki
  namespace: monitoring
type: Opaque
stringData:
  # Push URL from Grafana Cloud → Loki → Details (ends with /loki/api/v1/push).
  loki-url: "https://REPLACE_LOKI_HOST.grafana.net/loki/api/v1/push"
  # Same numeric “User” id shown for Loki basic auth (often matches Prometheus remote_write user).
  loki-username: "REPLACE_LOKI_USERNAME"
  # Access policy / API key with logs:write (glc_... or similar). Do not commit real tokens — patch after apply.
  api-key: "REPLACE_WITH_GRAFANA_CLOUD_LOGS_WRITE_TOKEN"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-loki-config
  namespace: monitoring
data:
  config.alloy: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    loki.write "grafanacloud" {
      external_labels = {
        cluster = "k3s",
      }
      endpoint {
        url = sys.env("LOKI_URL")
        basic_auth {
          username = sys.env("LOKI_USERNAME")
          password_file = "/etc/secrets/grafana-cloud-loki/api-key"
        }
        batch_wait = "1s"
        remote_timeout = "30s"
      }
    }

    discovery.kubernetes "pods" {
      role = "pod"
      selectors {
        role  = "pod"
        field = "spec.nodeName=" + sys.env("NODE_NAME")
      }
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        action       = "replace"
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        action       = "replace"
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        action       = "replace"
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        regex         = "(.+)"
        action        = "replace"
        target_label  = "app"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        regex         = "(.+)"
        action        = "replace"
        target_label  = "app"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        action       = "replace"
        target_label  = "node"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        regex         = "(.+)"
        action        = "replace"
        target_label  = "job"
        replacement   = "$1"
      }
    }

    loki.source.kubernetes "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.pod_logs.receiver]
    }

    loki.process "pod_logs" {
      forward_to = [loki.write.grafanacloud.receiver]

      // Unwrap container runtime (CRI) JSON lines to inner log text.
      stage.cri {}

      // Parse application JSON when present (tune keys to match your apps).
      stage.json {
        drop_malformed = false
        expressions = {
          http_status = "status",
          duration_ms  = "duration_ms",
          route        = "path",
          method       = "method",
          level        = "level",
        }
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy-logs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy-logs
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy-logs
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy-logs
    spec:
      serviceAccountName: alloy-logs
      # Official image runs as UID/GID 473; emptyDir volumes are root-owned unless fsGroup is set.
      securityContext:
        fsGroup: 473
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: alloy
          image: docker.io/grafana/alloy:v1.8.3
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOKI_URL
              valueFrom:
                secretKeyRef:
                  name: alloy-grafana-cloud-loki
                  key: loki-url
            - name: LOKI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: alloy-grafana-cloud-loki
                  key: loki-username
          ports:
            - name: http-metrics
              containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: grafana-cloud-loki
              mountPath: /etc/secrets/grafana-cloud-loki
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy/data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http-metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/ready
              port: http-metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 473
            runAsGroup: 473
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: alloy-loki-config
        - name: grafana-cloud-loki
          secret:
            secretName: alloy-grafana-cloud-loki
            defaultMode: 0400
            items:
              - key: api-key
                path: api-key
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
