apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-qwen25-7b
  namespace: ai
  labels:
    app: inference-qwen25-7b
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: inference-qwen25-7b
  template:
    metadata:
      labels:
        app: inference-qwen25-7b
    spec:
      automountServiceAccountToken: false
      runtimeClassName: nvidia
      dnsPolicy: "Default"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: inference-qwen25-7b
                topologyKey: kubernetes.io/hostname
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - --model
            - Qwen/Qwen2.5-7B-Instruct
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --gpu-memory-utilization
            - "0.7"
            - --max-model-len
            - "8192"
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: inference-qwen25-7b
  namespace: ai
spec:
  type: ClusterIP
  selector:
    app: inference-qwen25-7b
  ports:
    - port: 8000
      targetPort: 8000