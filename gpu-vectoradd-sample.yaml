apiVersion: v1
kind: Pod
metadata:
  name: cuda-vectoradd
spec:
  restartPolicy: OnFailure
  containers:
    - name: cuda-vectoradd
      # NVIDIA CUDA sample image (vectorAdd).
      image: "nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda11.7.1-ubuntu20.04"
      resources:
        limits:
          # Requires NVIDIA device plugin to be installed and advertising GPUs.
          nvidia.com/gpu: 1

