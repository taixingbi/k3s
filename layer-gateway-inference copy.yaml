apiVersion: v1
kind: ConfigMap
metadata:
  name: layer-gateway-inference-config
  namespace: ai
data:
  config.yaml: |
    server:
      host: 0.0.0.0
      port: 8010
      request_timeout_ms: 60000

    scheduler:
      tick_ms: 10
      queue_max_size: 500
      queue_max_age_ms: 2000
      dispatch_batch_size: 20

    routing:
      inflight_weight: 8.0
      queue_weight: 0.04
      ttft_weight: 0.03
      e2e_weight: 0.02
      error_weight: 100.0
      hot_penalty_weight: 20.0
      overload_penalty_weight: 15.0
      hot_window_sec: 2.0
      hot_target_share: 0.55

    backends:
      - name: gpu-node-1
        url: http://192.168.86.173:30080
        soft_limit: 20
        hard_limit: 28
        drained: false
      - name: gpu-node-2
        url: http://192.168.86.176:30080
        soft_limit: 20
        hard_limit: 28
        drained: false

    health:
      consecutive_failures_open: 5
      open_cooldown_ms: 15000
      half_open_max_inflight: 1
      max_error_rate_for_eligibility: 0.35

    retry:
      max_attempts: 2
      retryable_statuses: [502, 503, 504]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer-gateway-inference
  namespace: ai
  labels:
    app: layer-gateway-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: layer-gateway-inference
  template:
    metadata:
      labels:
        app: layer-gateway-inference
    spec:
      automountServiceAccountToken: false
      containers:
        - name: gateway
          image: docker.io/taixingbi/layer-gateway-inference-v1:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8010
          env:
            - name: GATEWAY_CONFIG
              value: /app/config.yaml
            - name: LOG_TIMEZONE
              value: EST
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: layer-gateway-inference-config

---
apiVersion: v1
kind: Service
metadata:
  name: layer-gateway-inference
  namespace: ai
  labels:
    app: layer-gateway-inference
spec:
  type: NodePort
  selector:
    app: layer-gateway-inference
  ports:
    - name: http
      port: 8010
      targetPort: http
      nodePort: 30180